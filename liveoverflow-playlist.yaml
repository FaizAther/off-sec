# LiveOverflow Binary Hacking playlist (incl. bin 0x00 + exploit.education style labs)
# https://www.youtube.com/watch?v=iyAyN3GFM7A&list=PLhixgUqwRTjxglIswKp9mpkfPNfHkzyeN
#
# Intended runtime: Docker + Docker Compose inside a Linux x86_64 VM (QEMU/VirtualBox/VMware all fine).
#
# Main lab image is Ubuntu 14.04 Trusty to align with the videos (gcc/glibc/gdb era).
# Pwntools is not baked in (Trusty + modern PyPI TLS is unreliable in 2026); install it on
# the host/VM, or add a newer Ubuntu-based sidecar image when you need modern pwntools.
#
# Usage (inside the x86_64 VM, from repo root):
#   docker compose -f liveoverflow-playlist.yaml build
#   docker compose -f liveoverflow-playlist.yaml up -d
#   docker exec -it liveoverflow-pwn bash

services:
  liveoverflow-pwn:
    image: liveoverflow-pwn:14.04
    build:
      context: ./containers/liveoverflow-pwn
      dockerfile: Dockerfile
    container_name: liveoverflow-pwn
    command: ["sleep", "infinity"]
    working_dir: /home/pwner/labs
    volumes:
      - ./liveoverflow-labs:/home/pwner/labs
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
    tty: true
    stdin_open: true

  liveoverflow-solver:
    build:
      context: ./containers/liveoverflow-solver
      dockerfile: Dockerfile
    image: liveoverflow-solver:24.04
    container_name: liveoverflow-solver
    command: ["sleep", "infinity"]
    working_dir: /workspace
    volumes:
      - ./:/workspace
    tty: true
    stdin_open: true

  ubuntu-trusty-minimal:
    image: docker.io/library/ubuntu:14.04
    container_name: ubuntu-14-trusty-minimal
    command: ["sleep", "infinity"]
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
